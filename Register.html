<!DOCTYPE html>
<html >
<head>

  <link rel="icon" href="img/logo (2).png">
  <title>Nova-Healthcare+</title>

  <link rel="stylesheet" href="Task07-Register.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>


  <header class="navbar">
    <div class="logo">
      <img src="img/logo (2).png" alt="Logo">
    </div>
    <nav class="menu">
      <a href="Home.html">Home</a>
      <a href="Patient-Registration.html">Patient Registration</a>
      <a href="Service.html">Service</a>
      <a href="About US.html">About Us</a>
      <a href="contactus.html">Contact us</a>
    </nav>
    <div class="login">
      <a href="login.html"><i class='bx bxs-user'></i> Login</a>
    </div>
  </header>


  <div class="register-container">
    <form class="register-form">
      <h2>Create an Account</h2>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your phone number" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Create password" required>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password" required>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select required>
          <option disabled selected>Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Others</option>
        </select>
      </div>

    <div class="form-check">
    <label class="checkbox-label">
        <input type="checkbox" required>
        I agree to the <a href="terms&conditions.html">terms & conditions</a>
    </label>
    </div>
      <button type="submit"><a href="Home.html">Register</a></button>

      <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>
    </form>
  </div>

</body>
</html>
