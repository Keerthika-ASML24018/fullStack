
   
   <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #EFEBE9;
            font-family: Arial;
        }

        .navbar {
            background-color: #4E342E;
        }

        .navbar-brand {
            color: white;
        }

        .card {
            background-color: #A1887F;
            border: none;
            border-radius: 10px;
            color: #4E342E;
        }

        .btn-brown {
            background-color: #4E342E;
            color: white;
        }

        .btn-brown:hover {
            background-color: #3E2723;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">My Dashboard</span>
    <button class="btn btn-light" onclick="logout()">Logout</button>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

    <h3 class="text-center mb-4">Welcome User 👋</h3>

    <!-- CARDS -->
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Profile</h5>
                <p id="name"></p>
                <p id="email"></p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Actions</h5>
                <button class="btn btn-brown" onclick="toggleData()">Show / Hide Info</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h5>Status</h5>
                <p>Active User ✅</p>
            </div>
        </div>

    </div>

    <!-- EXTRA DATA -->
    <div id="extraData" class="card p-3 mt-4">
        <h5>Extra Information</h5>
        <p>This is some hidden data you can toggle.</p>
    </div>

</div>

<script>

// Load user data
document.getElementById("name").innerText = "Name: " + localStorage.getItem("name");
document.getElementById("email").innerText = "Email: " + localStorage.getItem("email");

// Toggle
function toggleData() {
    let box = document.getElementById("extraData");

    if (box.style.display === "none") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}

// Logout
function logout() {
    window.location.href = "index.html";
}

</script>
